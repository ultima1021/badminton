
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>

  .gdrbdg{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;}
  .gdrbdg.M{background:var(--bl);color:var(--b);}.gdrbdg.F{background:#FAE8F2;color:#7A1450;}

  .ovbar{border-radius:var(--ras);padding:8px 12px;margin-bottom:9px;display:flex;align-items:center;gap:7px;font-size:11px;border:1.5px solid;}
  .ovbar.active{background:#FEF7E0;border-color:#F0D070;color:#6A4A00;}
  .ovbar.idle{background:var(--sf);border-color:var(--bd);color:var(--is);}

  .arow{display:flex;gap:7px;margin-top:4px;}
  .arow .pri{background:var(--g);color:#fff;flex:1;font-size:13px;font-weight:600;padding:12px;border-radius:var(--ras);}
  .arow .sec{background:var(--cd);color:var(--im);border:1.5px solid var(--bd);font-size:12px;padding:12px 14px;border-radius:var(--ras);}
  .hrow{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--bdl);font-size:11px;}
  .hrow:last-child{border-bottom:none;}
  .hscore{font-weight:700;min-width:40px;text-align:center;font-size:12px;}
  .htm{flex:1;color:var(--im);}.htm.r{text-align:right;}
  .mets{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
  .met{background:var(--cd);border:1.5px solid var(--bd);border-radius:var(--ras);padding:9px 10px;}
  .metl{font-size:9px;color:var(--if);font-weight:500;margin-bottom:2px;}
  .metv{font-size:18px;font-weight:600;}
  .stbl{width:100%;border-collapse:collapse;font-size:11px;}
  .stbl th{text-align:left;padding:7px 9px;font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--if);border-bottom:1.5px solid var(--bd);}
  .stbl td{padding:6px 9px;border-bottom:1px solid var(--bdl);}
  .stbl tr:last-child td{border-bottom:none;}
  .ppil{font-size:10px;font-weight:600;padding:1px 7px;border-radius:99px;}
  .ppil.hi{background:var(--rl);color:var(--r);}.ppil.mid{background:var(--al);color:var(--a);}.ppil.lo{background:var(--gl);color:var(--g);}
  .btrk{width:48px;height:4px;background:var(--bd);border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle;}
  .bfil{height:100%;border-radius:99px;background:var(--b);}
  .erow{display:flex;gap:5px;align-items:center;flex:1;flex-wrap:wrap;}
  .erow input,.erow select{font-size:12px;padding:4px 7px;}
  .svbtn{background:var(--g);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;}
  .cxbtn{background:none;border:1.5px solid var(--bd);font-size:11px;padding:4px 8px;border-radius:5px;color:var(--im);}
  .wchip{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;}
  .wchip.r{background:var(--rl);color:var(--r);}
  .wchip.a{background:var(--al);color:var(--a);}
  .bnote{text-align:center;font-size:10px;color:var(--if);padding:10px 0 4px;}
</style>
<div id="root" style="padding:12px;max-width:520px;margin:0 auto;"></div>
<script>
const {useState}=React;const h=React.createElement;
const TIER={A:3,"B+":2.5,"B-":2,C:1};
const LC={A:"#0A5C46","B+":"#1A3FA5","B-":"#7A4A00",C:"#8B1A1A"};
const LCLS={A:"A","B+":"Bp","B-":"Bm",C:"C"};
let _id=200;const uid=()=>String(++_id);
function mkP(n,l,g){return{id:uid(),name:n,level:l,gender:g,gamesPlayed:0,benchCount:0,ph:{},oppH:{}};}
const DEFS=[mkP("Alex","A","M"),mkP("Brian","A","M"),mkP("Chris","A","M"),mkP("Diana","A","F"),mkP("Elena","A","F"),mkP("Frank","B+","M"),mkP("Grace","B+","M"),mkP("Henry","B+","M"),mkP("Irene","B+","M"),mkP("Jenny","B-","F"),mkP("Karen","B-","F"),mkP("Leo","C","M")];
const ts=p=>TIER[p.level]||2;const tts=t=>t.reduce((s,p)=>s+ts(p),0);
function pri(p,all){const mx=Math.max(...all.map(x=>x.gamesPlayed),0);return(mx-p.gamesPlayed)*2+p.benchCount;}
function cOk(partner){return partner.level==="A"||partner.level==="B+";}
function cpen(t1,t2){let p=0;p+=Math.abs(tts(t1)-tts(t2))*10;const pc1=t1[0].ph[t1[1].id]||0,pc2=t2[0].ph[t2[1].id]||0;p+=pc1*pc1*40+pc2*pc2*40;for(const a of t1)for(const b of t2)p+=(a.oppH[b.id]||0)*5;for(const t of[t1,t2]){const cP=t.find(x=>x.level==="C");if(cP){const pt=t.find(x=>x.id!==cP.id);if(pt&&!cOk(pt))p+=800;}}for(const t of[t1,t2])if(t[0].gender===t[1].gender)p+=6;return p;}
function gen(players,nc){const np=nc*4;if(players.length<np)return null;const sorted=[...players].map(p=>({p,s:pri(p,players)+Math.random()*.01})).sort((a,b)=>b.s-a.s).map(x=>x.p);const playing=sorted.slice(0,np),benched=sorted.slice(np);let best=null,bestP=Infinity;for(let i=0;i<600;i++){const sh=[...playing].sort(()=>Math.random()-.5);const courts=[];for(let c=0;c<nc;c++){const cp=sh.slice(c*4,c*4+4);const opts=[{t1:[cp[0],cp[1]],t2:[cp[2],cp[3]]},{t1:[cp[0],cp[2]],t2:[cp[1],cp[3]]},{t1:[cp[0],cp[3]],t2:[cp[1],cp[2]]}];let bO=opts[0],bS=Infinity;for(const o of opts){const s=cpen(o.t1,o.t2);if(s<bS){bS=s;bO=o;}}courts.push(bO);}const p=courts.reduce((s,c)=>s+cpen(c.t1,c.t2),0);if(p<bestP){bestP=p;best=courts;}if(bestP===0)break;}return{courts:best,benched};}
function Av({name,level,sm}){const sz=sm?22:30;return h("div",{className:"av",style:{width:sz,height:sz,background:LC[level]||"#888",fontSize:sm?9:10}},name.slice(0,2).toUpperCase());}
function Lv({level}){return h("span",{className:`lvl ${LCLS[level]}`},level);}
function App(){
  const[players,setPlayers]=useState(DEFS);
  const[nc,setNc]=useState(2);
  const[rounds,setRounds]=useState([]);
  const[cur,setCur]=useState(null);
  const[sc,setSc]=useState({});
  const[tab,setTab]=useState("setup");
  const[form,setForm]=useState({name:"",level:"B+",gender:"M"});
  const[eid,setEid]=useState(null);
  const[ef,setEf]=useState({});
  const[ovMode,setOvMode]=useState(false);
  const[selPlay,setSelPlay]=useState(null);
  const[selBench,setSelBench]=useState(null);
  const rn=rounds.length+1;
  const maxC=Math.floor(players.length/4);
  const effC=Math.min(nc,maxC);
  function doGen(ps=players,n=effC){const m=gen(ps,Math.min(n,Math.floor(ps.length/4)));if(m){setCur(m);setSc({});setOvMode(false);setSelPlay(null);setSelBench(null);setTab("match");}}
  function doSwap(ci,team,pi,benchPid){setCur(prev=>{const courts=prev.courts.map((c,idx)=>{if(idx!==ci)return c;const t1=[...c.t1],t2=[...c.t2];const arr=team==="t1"?t1:t2;const out=arr[pi];const inP=prev.benched.find(b=>b.id===benchPid);if(!inP)return c;arr[pi]=inP;return{t1,t2};});const benched=prev.benched.map(b=>{if(b.id!==benchPid)return b;return prev.courts[ci][team][pi];});return{...prev,courts,benched};});}
  function clickPlay(ci,team,pi){if(!ovMode)return;if(selBench){doSwap(ci,team,pi,selBench);setSelBench(null);setSelPlay(null);}else setSelPlay({ci,team,pi});}
  function clickBench(pid){if(!ovMode)return;if(selPlay){doSwap(selPlay.ci,selPlay.team,selPlay.pi,pid);setSelPlay(null);setSelBench(null);}else setSelBench(pid);}
  function finish(){if(!cur)return;const ids=new Set(cur.courts.flatMap(c=>[...c.t1,...c.t2].map(p=>p.id)));const upd=players.map(p=>{const played=ids.has(p.id),benched=cur.benched.some(x=>x.id===p.id);const nph={...p.ph},noh={...p.oppH};if(played){cur.courts.forEach(c=>{const myT=c.t1.some(x=>x.id===p.id)?c.t1:c.t2.some(x=>x.id===p.id)?c.t2:null;const oppT=myT===c.t1?c.t2:c.t1;if(myT){const pt=myT.find(x=>x.id!==p.id);if(pt)nph[pt.id]=(nph[pt.id]||0)+1;oppT.forEach(op=>{noh[op.id]=(noh[op.id]||0)+1;});}});}return{...p,ph:nph,oppH:noh,gamesPlayed:played?p.gamesPlayed+1:p.gamesPlayed,benchCount:benched?p.benchCount+1:p.benchCount};});setPlayers(upd);setRounds(prev=>[...prev,{n:rn,courts:cur.courts.map((c,ci)=>({...c,s1:sc[ci]?.s1||"—",s2:sc[ci]?.s2||"—"})),benched:cur.benched}]);setOvMode(false);setSelPlay(null);setSelBench(null);const m=gen(upd,Math.min(nc,Math.floor(upd.length/4)));if(m){setCur(m);setSc({});}else{setCur(null);setTab("setup");}}
  function addP(){if(!form.name.trim()||players.length>=20)return;setPlayers(p=>[...p,mkP(form.name.trim(),form.level,form.gender)]);setForm(f=>({...f,name:""}));}
  function rmP(id){setPlayers(p=>p.filter(x=>x.id!==id));}
  function startE(p){setEid(p.id);setEf({name:p.name,level:p.level,gender:p.gender});}
  function saveE(id){setPlayers(p=>p.map(x=>x.id===id?{...x,...ef}:x));setEid(null);}

  const tabs=[{id:"setup",label:"Players"},{id:"match",label:cur?`Round ${rn}`:"Match",dot:!!cur},{id:"history",label:"History",count:rounds.length},{id:"stats",label:"Stats"}];

  return h("div",null,
    h("div",{className:"hdr"},
      h("div",null,h("div",{className:"htitle"},"🏸 Badminton"),h("div",{className:"hsub"},`${players.length} players · ${rounds.length} rounds`)),
      h("div",{style:{display:"flex",gap:6}},
        cur&&h("button",{className:"gbtn gh",onClick:()=>doGen()},"↻"),
        !cur&&h("button",{className:"gbtn",disabled:players.length<4,onClick:()=>doGen()},`▶ Round ${rn}`)
      )
    ),
    h("div",{className:"tabs"},tabs.map(t=>h("button",{key:t.id,className:`tab ${tab===t.id?"on":""}`,onClick:()=>setTab(t.id)},t.label,t.dot&&h("span",{className:"dot"}),t.count>0&&h("span",{className:"bdg"},t.count)))),

    // SETUP
    tab==="setup"&&h("div",null,
      h("div",{className:"shdr"},"Courts"),
      h("div",{className:"card",style:{marginBottom:10}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}},
          h("div",null,
            h("div",{style:{fontSize:13,fontWeight:500}},`${effC*4} play · ${players.length-effC*4} rest`),
            h("div",{style:{fontSize:10,color:"var(--if)",marginTop:2}},maxC<nc?`Max ${maxC} with ${players.length}p`:`${effC} court${effC!==1?"s":""}`)
          ),
          h("div",{style:{display:"flex",gap:5}},
            [1,2,3,4,5].map(n=>h("button",{key:n,className:`crtbtn ${nc===n?"on":""}`,disabled:n>maxC,onClick:()=>n<=maxC&&setNc(n)},n))
          )
        )
      ),
      h("div",{className:"shdr"},`Players (${players.length}/20)`),
      h("div",{className:"card",style:{marginBottom:10}},
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          h("input",{value:form.name,placeholder:"Name",onChange:e=>setForm(f=>({...f,name:e.target.value})),onKeyDown:e=>e.key==="Enter"&&addP(),style:{flex:"1 1 110px",minWidth:90}}),
          h("select",{value:form.level,onChange:e=>setForm(f=>({...f,level:e.target.value})),style:{flex:"0 0 auto"}},Object.keys(TIER).map(l=>h("option",{key:l,value:l},l))),
          h("select",{value:form.gender,onChange:e=>setForm(f=>({...f,gender:e.target.value})),style:{flex:"0 0 auto"}},h("option",{value:"M"},"Male"),h("option",{value:"F"},"Female")),
          h("button",{style:{background:"var(--g)",color:"#fff",fontSize:13,fontWeight:600,padding:"8px 14px",borderRadius:"var(--ras)"},disabled:!form.name.trim()||players.length>=20,onClick:addP},"Add")
        )
      ),
      h("div",null,players.map(p=>h("div",{key:p.id,className:"prow"},
        h(Av,{name:p.name,level:p.level}),
        eid===p.id
          ?h("div",{className:"erow"},
              h("input",{value:ef.name,onChange:e=>setEf(f=>({...f,name:e.target.value})),style:{flex:"1 1 80px",minWidth:70}}),
              h("select",{value:ef.level,onChange:e=>setEf(f=>({...f,level:e.target.value}))},Object.keys(TIER).map(l=>h("option",{key:l,value:l},l))),
              h("select",{value:ef.gender,onChange:e=>setEf(f=>({...f,gender:e.target.value}))},h("option",{value:"M"},"M"),h("option",{value:"F"},"F")),
              h("button",{className:"svbtn",onClick:()=>saveE(p.id)},"Save"),
              h("button",{className:"cxbtn",onClick:()=>setEid(null)},"✕"))
          :h("span",{className:"pname"},p.name),
        eid!==p.id&&h(Lv,{level:p.level}),
        eid!==p.id&&h("span",{className:`gdrbdg ${p.gender}`},p.gender),
        eid!==p.id&&h("span",{className:"pstats"},`${p.gamesPlayed}G ${p.benchCount}B`),
        eid!==p.id&&h("button",{className:"icbtn",onClick:()=>startE(p)},"✎"),
        eid!==p.id&&h("button",{className:"icbtn",style:{color:"var(--r)"},onClick:()=>rmP(p.id)},"×")
      ))),
      players.length>=4&&h("div",{style:{textAlign:"center",padding:"16px 0 6px"}},
        h("button",{style:{background:"var(--g)",color:"#fff",fontSize:14,fontWeight:600,padding:"11px 26px",borderRadius:10},onClick:()=>doGen()},`▶ Generate Round ${rn}`),
        h("div",{style:{fontSize:10,color:"var(--if)",marginTop:6}},`${effC*4} on ${effC} court${effC!==1?"s":""} · ${players.length-effC*4} rest`)
      ),
      players.length<4&&h("div",{style:{textAlign:"center",color:"var(--if)",fontSize:12,padding:"20px 0"}},"Need at least 4 players.")
    ),

    // MATCH
    tab==="match"&&!cur&&h("div",{style:{textAlign:"center",padding:"36px 0",color:"var(--if)"}},
      h("div",{style:{fontSize:28,marginBottom:6}},"🏸"),
      h("div",{style:{fontSize:13}},"No active round."),
      h("button",{style:{background:"var(--cd)",border:"1.5px solid var(--bd)",color:"var(--im)",fontSize:12,padding:"7px 14px",borderRadius:8,marginTop:12},onClick:()=>setTab("setup")},"← Back")
    ),

    tab==="match"&&cur&&h("div",null,
      // Override bar
      ovMode
        ?h("div",{className:"ovbar active"},
            h("span",null,selPlay?"Now tap a bench player ↓":selBench?"Now tap a court player ↑":"Tap any court player to select"),
            h("button",{className:"ovcta off",onClick:()=>{setOvMode(false);setSelPlay(null);setSelBench(null);}},"Done ✓"))
        :h("div",{className:"ovbar idle"},
            h("span",null,"Want to manually swap someone in/out?"),
            h("button",{className:"ovcta on",onClick:()=>setOvMode(true)},"✎ Override")),

      // Balance strip
      h("div",{style:{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}},
        cur.courts.map((c,ci)=>{const d=Math.abs(tts(c.t1)-tts(c.t2));return h("div",{key:ci,style:{fontSize:10,padding:"3px 9px",borderRadius:4,background:d<=1?"var(--gl)":d<=2?"var(--al)":"var(--rl)",color:d<=1?"var(--g)":d<=2?"var(--a)":"var(--r)"}},`C${ci+1}: ${tts(c.t1).toFixed(1)}–${tts(c.t2).toFixed(1)} Δ${d.toFixed(1)}${d<=1?" ✓":" ⚠"}`);})),

      // Courts
      cur.courts.map((c,ci)=>{
        const d=Math.abs(tts(c.t1)-tts(c.t2));
        const all4=[...c.t1,...c.t2],cP=all4.find(p=>p.level==="C");
        let cWarn=null;
        if(cP){const myT=c.t1.some(p=>p.id===cP.id)?c.t1:c.t2;const pt=myT.find(p=>p.id!==cP.id);if(pt&&!cOk(pt))cWarn=pt.level;}
        const r1=c.t1[0].ph[c.t1[1].id]||0,r2=c.t2[0].ph[c.t2[1].id]||0;
        const renderT=(team,tk)=>h("div",{className:`tblock ${tk}`},
          h("div",{className:`tmeta ${tk}`},h("span",null,tk==="t1"?"Team 1":"Team 2"),h("span",null,tts(team).toFixed(1))),
          team.map((p,pi)=>{const isSP=ovMode&&selPlay&&selPlay.ci===ci&&selPlay.team===tk&&selPlay.pi===pi;return h("div",{key:p.id,className:`pentry ${isSP?"sel":""}`,onClick:ovMode?()=>clickPlay(ci,tk,pi):undefined,style:ovMode?{cursor:"pointer"}:{}},
            h(Av,{name:p.name,level:p.level,sm:true}),
            h("span",{className:"penname"},p.name),
            h(Lv,{level:p.level}),
            ovMode&&!isSP&&h("span",{style:{fontSize:8,color:"var(--a)",fontWeight:600,marginLeft:1}},"↕")
          );}),
          (tk==="t1"?r1:r2)>0&&h("div",{style:{fontSize:9,color:"var(--a)",marginTop:3}},`⚠ paired ${tk==="t1"?r1:r2}× before`)
        );
        return h("div",{key:ci,className:"card",style:{marginBottom:10}},
          h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:9}},
            h("span",{style:{background:"var(--g)",color:"#fff",fontSize:10,fontWeight:600,padding:"2px 9px",borderRadius:4}},`Court ${ci+1}`),
            d>1&&h("span",{className:"wchip a"},`Δ${d.toFixed(1)} ⚠`),
            cWarn&&h("span",{className:"wchip r"},`C+${cWarn} ⚠`)
          ),
          h("div",{className:"tgrid"},
            renderT(c.t1,"t1"),
            h("div",{className:"scol"},
              h("label",null,"Score"),
              h("input",{type:"number",min:0,inputMode:"numeric",placeholder:"—",value:sc[ci]?.s1||"",onChange:e=>setSc(p=>({...p,[ci]:{...(p[ci]||{}),s1:e.target.value}}))}),
              h("span",{className:"vs"},"vs"),
              h("input",{type:"number",min:0,inputMode:"numeric",placeholder:"—",value:sc[ci]?.s2||"",onChange:e=>setSc(p=>({...p,[ci]:{...(p[ci]||{}),s2:e.target.value}}))})
            ),
            renderT(c.t2,"t2")
          )
        );
      }),

      // Bench
      h("div",{className:"bsec"},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
          h("span",{style:{fontSize:11,fontWeight:600,color:"var(--is)",textTransform:"uppercase",letterSpacing:.5}},"Resting"),
          ovMode&&h("span",{style:{fontSize:10,color:"var(--g)"}},selPlay?"← tap to sub in":"tap to select")
        ),
        cur.benched.length===0
          ?h("div",{style:{fontSize:11,color:"var(--if)",marginTop:6}},"Everyone playing this round")
          :h("div",{className:"bchips"},
              cur.benched.map(p=>{const isSB=ovMode&&selBench===p.id;return h("div",{key:p.id,className:`bchip ${ovMode?"av-tap":""} ${isSB?"sel-bench":""}`,onClick:ovMode?()=>clickBench(p.id):undefined},
                h(Av,{name:p.name,level:p.level,sm:true}),
                h("span",null,p.name),
                h(Lv,{level:p.level}),
                ovMode&&h("span",{style:{fontSize:9,color:"var(--g)",fontWeight:600}},selPlay?"sub in":"tap")
              );}))
      ),

      h("div",{className:"bnote"},"Scores optional. Confirming updates partner history for smarter next round."),
      h("div",{className:"arow"},
        h("button",{className:"pri",onClick:finish},"✓ Confirm & Next Round"),
        h("button",{className:"sec",onClick:()=>doGen()},"↻ Reshuffle")
      )
    ),

    // HISTORY
    tab==="history"&&h("div",null,
      rounds.length===0&&h("div",{style:{textAlign:"center",padding:"36px 0",color:"var(--if)"}},"No rounds yet."),
      [...rounds].reverse().map(r=>h("div",{key:r.n,className:"card",style:{marginBottom:9}},
        h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:8}},
          h("span",{style:{background:"var(--g)",color:"#fff",fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:3}},`Round ${r.n}`),
          h("span",{style:{fontSize:10,color:"var(--if)"}},`${r.courts.length} court${r.courts.length!==1?"s":""}`)
        ),
        r.courts.map((c,ci)=>h("div",{key:ci,className:"hrow"},
          h("span",{style:{background:"#eee",color:"var(--is)",fontSize:9,fontWeight:600,padding:"1px 5px",borderRadius:2}},`C${ci+1}`),
          h("span",{className:"htm"},c.t1.map(p=>p.name).join(" & ")),
          h("span",{className:"hscore"},`${c.s1}–${c.s2}`),
          h("span",{className:"htm r"},c.t2.map(p=>p.name).join(" & "))
        )),
        r.benched.length>0&&h("div",{style:{fontSize:10,color:"var(--if)",marginTop:6,paddingTop:5,borderTop:"1px solid var(--bdl)"}},
          "Rested: "+r.benched.map(p=>p.name).join(", "))
      ))
    ),

    // STATS
    tab==="stats"&&h("div",null,
      h("div",{className:"mets"},
        [{l:"Players",v:players.length},{l:"Courts",v:effC},{l:"Rounds",v:rounds.length},{l:"Matches",v:rounds.reduce((s,r)=>s+r.courts.length,0)}]
          .map(m=>h("div",{key:m.l,className:"met"},h("div",{className:"metl"},m.l),h("div",{className:"metv"},m.v)))
      ),
      h("div",{className:"card",style:{padding:0,overflow:"hidden"}},
        h("table",{className:"stbl"},
          h("thead",null,h("tr",null,["Player","Lvl","G","Bench","Pri","Variety"].map(c=>h("th",{key:c},c)))),
          h("tbody",null,[...players].sort((a,b)=>pri(b,players)-pri(a,players)).map((p,i)=>{
            const pv=pri(p,players),mx=Math.max(...players.map(x=>x.gamesPlayed),1);
            const uniq=Object.keys(p.ph).filter(k=>p.ph[k]>0).length;
            return h("tr",{key:p.id,style:{background:i%2===0?"":"var(--sf)"}},
              h("td",null,h("div",{style:{display:"flex",alignItems:"center",gap:6}},h(Av,{name:p.name,level:p.level,sm:true}),h("span",{style:{fontWeight:500}},p.name))),
              h("td",null,h(Lv,{level:p.level})),
              h("td",null,h("span",{style:{fontWeight:600}},p.gamesPlayed)),
              h("td",null,p.benchCount),
              h("td",null,h("span",{className:`ppil ${pv>4?"hi":pv>2?"mid":"lo"}`},pv)),
              h("td",null,h("div",{style:{display:"flex",alignItems:"center",gap:5}},h("div",{className:"btrk"},h("div",{className:"bfil",style:{width:Math.round(uniq/Math.max(players.length-1,1)*48)}})),h("span",{style:{fontSize:10,color:"var(--if)"}},`${uniq}`)))
            );
          }))
        )
      ),
      h("div",{className:"bnote"},"Priority = (max_games−yours)×2 + bench · Variety = unique partners so far")
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
